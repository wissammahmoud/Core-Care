# ============================================
# CORE CARE - Docker Compose Configuration
# ============================================
# Multi-container setup:
# - Flask API (Core Care backend)
# - Milvus (Vector database)
# - Etcd (Milvus dependency)
# - MinIO (Milvus storage)
# ============================================

version: '3.8'

services:
  # ============================================
  # Core Care API Service
  # ============================================
  core-care-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core-care-api
    
    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # Environment variables
    env_file:
      - .env
    
    environment:
      - FLASK_ENV=production
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
    
    # Ports
    ports:
      - "5000:5000"
    
    # Volumes
    volumes:
      # Application logs
      - ./logs:/app/logs
      # Model cache (persistent)
      - model_cache:/app/cache
      # Uploads (if needed)
      - ./uploads:/app/uploads
    
    # Dependencies
    depends_on:
      milvus-standalone:
        condition: service_healthy
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Networks
    networks:
      - core-care-network

  # ============================================
  # Milvus Standalone Service
  # ============================================
  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.3
    
    command: ["milvus", "run", "standalone"]
    
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    
    ports:
      - "19530:19530"
      - "9091:9091"
    
    volumes:
      - milvus_data:/var/lib/milvus
    
    depends_on:
      - etcd
      - minio
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    
    networks:
      - core-care-network

  # ============================================
  # Etcd Service (Milvus dependency)
  # ============================================
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    
    volumes:
      - etcd_data:/etcd
    
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    
    networks:
      - core-care-network

  # ============================================
  # MinIO Service (Milvus storage)
  # ============================================
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    
    ports:
      - "9000:9000"
      - "9001:9001"
    
    volumes:
      - minio_data:/minio_data
    
    command: minio server /minio_data --console-address ":9001"
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    
    networks:
      - core-care-network

# ============================================
# Volumes
# ============================================
volumes:
  model_cache:
    driver: local
  milvus_data:
    driver: local
  etcd_data:
    driver: local
  minio_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  core-care-network:
    driver: bridge

# ============================================
# USAGE:
# ============================================
# Build and start all services:
#   docker-compose up -d --build
#
# View logs:
#   docker-compose logs -f core-care-api
#   docker-compose logs -f milvus-standalone
#
# Stop all services:
#   docker-compose down
#
# Stop and remove volumes (WARNING: deletes data):
#   docker-compose down -v
#
# Restart specific service:
#   docker-compose restart core-care-api
#
# Scale API service (if needed):
#   docker-compose up -d --scale core-care-api=3
# ============================================